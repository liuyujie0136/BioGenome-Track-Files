<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
    <title>Jiangnan Gacha Simulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent
        }

        :root {
            --bg-paper: #f5f0e8;
            --bg-dark: #2c1810;
            --text-dark: #3d2b1f;
            --text-light: #d4c4a8;
            --accent-red: #8b2500;
            --accent-gold: #c9a84c;
            --gold: #ffd700;
            --blue: #4a90d9;
            --green: #4caf50;
            --border-light: #d4c4a8;
            --card-bg: #faf6ef
        }

        body {
            font-family: 'Noto Serif SC', 'STSong', 'SimSun', serif;
            background: var(--bg-paper);
            color: var(--text-dark);
            min-height: 100vh;
            overflow-x: hidden;
            user-select: none
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 20% 50%, rgba(201, 168, 76, .06) 0%, transparent 50%), radial-gradient(ellipse at 80% 20%, rgba(139, 37, 0, .04) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0
        }

        .app {
            position: relative;
            z-index: 1;
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh
        }

        .header {
            background: linear-gradient(135deg, #2c1810, #4a2c1a 50%, #2c1810);
            color: var(--text-light);
            padding: 18px 16px 14px;
            text-align: center;
            position: relative;
            overflow: hidden
        }

        .header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5L35 15L30 12L25 15Z' fill='rgba(201,168,76,.08)'/%3E%3C/svg%3E") repeat;
            pointer-events: none
        }

        .header h1 {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 4px;
            color: var(--accent-gold);
            text-shadow: 0 2px 8px rgba(0, 0, 0, .3);
            position: relative
        }

        .header .subtitle {
            font-size: 12px;
            color: var(--text-light);
            opacity: .7;
            margin-top: 2px;
            letter-spacing: 3px
        }

        .nav-tabs {
            display: flex;
            background: #3d2b1f;
            border-bottom: 2px solid var(--accent-gold);
            position: sticky;
            top: 0;
            z-index: 50
        }

        .nav-tab {
            flex: 1;
            padding: 11px 4px;
            text-align: center;
            color: var(--text-light);
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: .3s;
            border-bottom: 3px solid transparent;
            letter-spacing: 1px
        }

        .nav-tab:hover {
            background: rgba(201, 168, 76, .1)
        }

        .nav-tab.active {
            color: var(--accent-gold);
            border-bottom-color: var(--accent-gold);
            background: rgba(201, 168, 76, .15)
        }

        .content {
            padding: 12px
        }

        .tab-content {
            display: none
        }

        .tab-content.active {
            display: block
        }

        /* DRAWING */
        .draw-section {
            text-align: center
        }

        .draw-hint {
            font-size: 13px;
            color: #8b7355;
            margin-bottom: 8px;
            letter-spacing: 1px
        }

        .canvas-wrapper {
            position: relative;
            /* border: 2px solid var(--border-light); */
            /* border-radius: 12px; */
            overflow: hidden;
            /* background: #e3dddd; */
            /* box-shadow: 0 4px 20px rgba(0, 0, 0, .08), inset 0 0 60px rgba(245, 240, 232, .5); */
            margin: 0 auto;
            background-image: url('images/bg_tian_blank.png');
            background-size: 100% 100%;
            background-position: center;
            aspect-ratio: 1 / 1.25
        }

        #drawCanvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
            touch-action: none
        }

        .canvas-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: .8;
            transition: opacity .3s
        }

        .canvas-overlay.hidden {
            opacity: 0
        }

        .canvas-overlay span {
            position: absolute;
            top: 36px;
            right: 36px;
            writing-mode: vertical-rl;
            font-size: 36px;
            font-weight: 900;
            color: #000000;
            letter-spacing: 2px
        }

        .draw-controls {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap
        }

        .mode-toggle {
            display: flex;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-light)
        }

        .mode-btn {
            padding: 7px 14px;
            border: none;
            background: var(--card-bg);
            font-family: inherit;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            color: var(--text-dark);
            transition: .2s
        }

        .mode-btn.active {
            background: var(--accent-red);
            color: #fff
        }

        .clear-btn {
            padding: 7px 14px;
            border: 1px solid #ccc;
            background: #fff;
            border-radius: 6px;
            font-family: inherit;
            font-size: 12px;
            cursor: pointer;
            color: #999;
            transition: .2s
        }

        .clear-btn:hover {
            border-color: #e74c3c;
            color: #e74c3c
        }

        .pool-toggle {
            padding: 7px 14px;
            border: 1px solid var(--accent-gold);
            background: transparent;
            color: var(--accent-gold);
            border-radius: 6px;
            font-family: inherit;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: .2s
        }

        .pool-toggle:hover {
            background: rgba(201, 168, 76, .15)
        }

        .pool-toggle.active {
            background: var(--accent-gold);
            color: #fff
        }

        .quick-stats {
            display: flex;
            gap: 6px;
            margin-top: 12px;
            flex-wrap: wrap;
            justify-content: center
        }

        .stat-chip {
            padding: 5px 10px;
            background: rgba(201, 168, 76, .1);
            border: 1px solid rgba(201, 168, 76, .3);
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
        }

        .stat-chip strong {
            color: var(--accent-red)
        }

        /* REVEAL - artwork with background */
        .reveal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 200;
            background: linear-gradient(180deg, #1a0e08, #2c1810 30%, #3d2b1f);
            flex-direction: column;
            align-items: center;
            justify-content: center
        }

        .reveal-overlay.show {
            display: flex
        }

        .reveal-counter {
            font-size: 24px;
            font-weight: 900;
            color: var(--accent-gold);
            margin-bottom: 10px;
            letter-spacing: 2px;
            opacity: .8
        }

        .reveal-art-area {
            position: relative;
            width: 280px;
            height: 400px;
            margin-bottom: 12px;
            cursor: pointer;
            border-radius: 12px;
            overflow: hidden;
            opacity: 0;
            transform: scale(.92);
            transition: opacity .5s ease, transform .5s ease
        }

        .reveal-art-area.visible {
            opacity: 1;
            transform: scale(1)
        }

        .reveal-art-area .bg-img {
            position: absolute;
            inset: 0;
            left: 5%;
            width: 90%;
            height: 100%;
            object-fit: contain
        }

        .reveal-art-area .art-img {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            height: 80%;
            object-fit: contain;
            object-position: bottom center
        }

        .reveal-art-area .new-tag {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #e74c3c;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 6px;
            animation: newPulse 1s ease-in-out infinite;
            z-index: 2
        }

        @keyframes newPulse {

            0%,
            100% {
                transform: scale(1)
            }

            50% {
                transform: scale(1.1)
            }
        }

        .reveal-art-area .sparkles {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 1
        }

        .sparkle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: var(--gold);
            border-radius: 50%;
            animation: sparkleAnim 1.5s ease-out forwards
        }

        @keyframes sparkleAnim {
            0% {
                opacity: 1;
                transform: scale(0) translate(0, 0)
            }

            50% {
                opacity: 1;
                transform: scale(1) translate(var(--tx), var(--ty))
            }

            100% {
                opacity: 0;
                transform: scale(.5) translate(calc(var(--tx)*2), calc(var(--ty)*2))
            }
        }

        .reveal-name {
            color: #ffffff;
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 4px;
            margin-bottom: 4px;
            opacity: 1;
            transform: translateY(10px);
            transition: opacity .4s .2s, transform .4s .2s
        }

        .reveal-name.visible {
            opacity: 1;
            transform: translateY(0)
        }

        .reveal-name.tian {
            color: #ffd700;
            text-shadow: 0 2px 12px rgba(255, 215, 0, .5)
        }

        .reveal-name.hou {
            color: #6ab0ff;
            text-shadow: 0 2px 12px rgba(74, 144, 217, .4)
        }

        .reveal-name.qing {
            color: #81c784;
            text-shadow: 0 2px 12px rgba(76, 175, 80, .4)
        }

        .reveal-hint {
            font-size: 13px;
            color: rgba(212, 196, 168, .5);
            letter-spacing: 2px;
            margin-top: 8px;
            animation: hintBlink 2s ease-in-out infinite
        }

        @keyframes hintBlink {

            0%,
            100% {
                opacity: .3
            }

            50% {
                opacity: .7
            }
        }

        .reveal-actions {
            margin-top: 8px
        }

        .reveal-skip-btn {
            padding: 8px 24px;
            border: 1px solid rgba(201, 168, 76, .4);
            background: transparent;
            color: var(--accent-gold);
            border-radius: 6px;
            font-family: inherit;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: .2s;
            letter-spacing: 2px
        }

        .reveal-skip-btn:hover {
            background: rgba(201, 168, 76, .15)
        }

        /* ALL RESULTS */
        .all-results-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 200;
            background: linear-gradient(180deg, #1a0e08, #2c1810 30%, #3d2b1f);
            overflow-y: auto;
            padding: 16px
        }

        .all-results-overlay.show {
            display: block
        }

        .all-results-title {
            text-align: center;
            font-size: 24px;
            font-weight: 900;
            color: var(--accent-gold);
            letter-spacing: 4px;
            margin-bottom: 16px
        }

        .all-results-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            max-width: 480px;
            margin: 0 auto 20px
        }

        .mini-card {
            aspect-ratio: 3/4;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: .3s;
            position: relative;
            animation: miniIn .3s ease-out both
        }

        .mini-card:hover {
            transform: translateY(-3px)
        }

        @keyframes miniIn {
            from {
                opacity: 0;
                transform: scale(.8)
            }

            to {
                opacity: 1;
                transform: scale(1)
            }
        }

        .mini-card .mc-bg {
            position: absolute;
            inset: 0;
            left: 5%;
            width: 90%;
            height: 100%;
            object-fit: contain
        }

        .mini-card .mc-art {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            height: 80%;
            object-fit: contain;
            object-position: bottom center
        }

        .mini-card .mc-name {
            position: absolute;
            bottom: 5%;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 1px 4px rgba(0, 0, 0, .8);
            padding: 2px;
            background: linear-gradient(transparent, rgba(0, 0, 0, .6));
            z-index: 1
        }

        .mini-card .mc-new {
            position: absolute;
            top: 2px;
            right: 2px;
            background: #e74c3c;
            color: #fff;
            font-size: 7px;
            padding: 1px 4px;
            border-radius: 3px;
            font-weight: 700;
            z-index: 2
        }

        .mini-card.tian {
            border: 2px solid var(--gold);
            box-shadow: 0 0 10px rgba(255, 215, 0, .3)
        }

        .mini-card.hou {
            border: 2px solid var(--blue)
        }

        .mini-card.qing {
            border: 2px solid var(--green)
        }

        .all-results-close {
            display: block;
            margin: 0 auto;
            padding: 10px 40px;
            border: 1px solid rgba(201, 168, 76, .4);
            background: transparent;
            color: var(--accent-gold);
            border-radius: 8px;
            font-family: inherit;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 4px;
            transition: .2s
        }

        .all-results-close:hover {
            background: rgba(201, 168, 76, .15)
        }

        /* COLLECTION */
        .collection-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px
        }

        .collection-header h2 {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent-red)
        }

        .filter-buttons {
            display: flex;
            gap: 5px
        }

        .filter-btn {
            padding: 5px 12px;
            border: 1px solid var(--border-light);
            background: var(--card-bg);
            border-radius: 16px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: .2s;
            color: var(--text-dark)
        }

        .filter-btn:hover {
            border-color: var(--accent-gold)
        }

        .filter-btn.active {
            background: var(--accent-red);
            color: #fff;
            border-color: var(--accent-red)
        }

        .collection-progress {
            margin-bottom: 12px;
            padding: 10px 14px;
            background: var(--card-bg);
            border-radius: 8px;
            border: 1px solid var(--border-light)
        }

        .progress-bar {
            height: 8px;
            background: #e8dcc8;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 6px
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-red), var(--accent-gold));
            border-radius: 4px;
            transition: width .5s
        }

        .collection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
            gap: 6px
        }

        .collection-item {
            aspect-ratio: 1;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: .2s;
            position: relative;
            overflow: hidden
        }

        .collection-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 0, 0, .12)
        }

        .collection-item.locked {
            opacity: .4;
            filter: grayscale(.8)
        }

        .collection-item .ci-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            object-fit: cover;
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%)
        }

        .collection-item .ci-frame {
            width: 72px;
            height: 70px;
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none
        }

        .collection-item .ci-name {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            line-height: 1.2;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            padding: 0 2px
        }

        .collection-item .ci-count {
            position: absolute;
            top: 0;
            right: 0;
            background: rgba(0, 0, 0, .6);
            color: #fff;
            font-size: 10px;
            font-weight: 500;
            padding: 0 3px;
            border-radius: 0 8px 0 4px
        }

        .collection-item.tian {
            background: rgba(255, 215, 0, .1)
        }

        .collection-item.hou {
            background: rgba(74, 144, 217, .08)
        }

        .collection-item.qing {
            background: rgba(76, 175, 80, .08)
        }

        /* DETAIL MODAL - artwork with background */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(44, 24, 16, .9);
            z-index: 300;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px)
        }

        .modal-overlay.show {
            display: flex
        }

        .modal-content {
            max-width: 320px;
            width: 90%;
            text-align: center;
            animation: modalIn .3s ease-out;
            border-radius: 16px;
            overflow: hidden;
            background: #2c1810
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(.9)
            }

            to {
                opacity: 1;
                transform: scale(1)
            }
        }

        .modal-art-area {
            position: relative;
            width: 100%;
            height: 360px;
            overflow: hidden
        }

        .modal-art-area .ma-bg {
            position: absolute;
            inset: 0;
            left: 5%;
            width: 90%;
            height: 100%;
            object-fit: contain
        }

        .modal-art-area .ma-art {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            height: 80%;
            object-fit: contain;
            object-position: bottom center
        }

        .modal-art-area .ma-new {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #e74c3c;
            color: #fff;
            font-size: 12px;
            padding: 3px 10px;
            border-radius: 4px;
            font-weight: 700
        }

        .modal-info {
            padding: 16px;
            background: #2c1810
        }

        .modal-info .mi-name {
            color: #ffffff;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 4px;
            margin-bottom: 4px
        }

        .modal-info .mi-name.tian {
            color: #ffd700
        }

        .modal-info .mi-name.hou {
            color: #6ab0ff
        }

        .modal-info .mi-name.qing {
            color: #81c784
        }

        .modal-info .mi-count {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-light)
        }

        .modal-close {
            margin-top: 12px;
            padding: 7px 28px;
            border: 1px solid rgba(201, 168, 76, .4);
            background: transparent;
            color: var(--accent-gold);
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: .2s
        }

        .modal-close:hover {
            background: rgba(201, 168, 76, .15)
        }

        /* CUSTOM POOL */
        .pool-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 250;
            background: rgba(44, 24, 16, .92);
            overflow-y: auto;
            padding: 16px
        }

        .pool-overlay.show {
            display: block
        }

        .pool-header {
            max-width: 480px;
            margin: 0 auto 12px;
            display: flex;
            justify-content: space-between;
            align-items: center
        }

        .pool-header h2 {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent-gold);
            letter-spacing: 2px
        }

        .pool-actions {
            display: flex;
            gap: 8px
        }

        .pool-action-btn {
            padding: 6px 14px;
            border: 1px solid rgba(201, 168, 76, .4);
            background: transparent;
            color: var(--accent-gold);
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: .2s
        }

        .pool-action-btn:hover {
            background: rgba(201, 168, 76, .15)
        }

        .pool-action-btn.primary {
            background: var(--accent-gold);
            color: #2c1810;
            border-color: var(--accent-gold)
        }

        .pool-info {
            max-width: 480px;
            margin: 0 auto 12px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-light);
            text-align: center
        }

        .pool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
            gap: 6px;
            max-width: 480px;
            margin: 0 auto
        }

        .pool-item {
            aspect-ratio: 1;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: .2s;
            position: relative;
            overflow: hidden
        }

        .pool-item:hover {
            transform: translateY(-2px)
        }

        .pool-item.selected {
            box-shadow: 0 0 12px rgba(201, 168, 76, .5)
        }

        .pool-item.tian {
            background: rgba(255, 215, 0, .1)
        }

        .pool-item.tian.selected {
            background: rgba(255, 215, 0, .25)
        }

        .pool-item.hou {
            background: rgba(74, 144, 217, .08)
        }

        .pool-item.hou.selected {
            background: rgba(74, 144, 217, .2)
        }

        .pool-item.qing {
            background: rgba(76, 175, 80, .08)
        }

        .pool-item.qing.selected {
            background: rgba(76, 175, 80, .2)
        }

        .pool-item .pi-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%)
        }

        .pool-item .pi-frame {
            width: 60px;
            height: 60px;
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none
        }

        .pool-item .pi-name {
            color: #ffffff;
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            line-height: 1.2;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            padding: 0 2px
        }

        .pool-item .check-mark {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--accent-gold);
            color: #2c1810;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 900;
            z-index: 2
        }

        .pool-item.selected .check-mark {
            display: flex
        }

        /* Pool name and search */
        .pool-search {
            max-width: 480px;
            margin: 0 auto 12px
        }

        .pool-search input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border-light);
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            background: rgba(255, 255, 255, .1);
            color: var(--text-light);
            outline: none
        }

        .pool-search input::placeholder {
            color: rgba(212, 196, 168, .5)
        }

        .pool-search input:focus {
            border-color: var(--accent-gold)
        }

        /* STATS */
        .stats-panel {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid var(--border-light)
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 16px
        }

        .stat-card {
            padding: 14px;
            background: var(--bg-paper);
            border-radius: 8px;
            text-align: center;
            border: 1px solid var(--border-light)
        }

        .stat-card .sv {
            font-size: 26px;
            font-weight: 900;
            color: var(--accent-red)
        }

        .stat-card .sl {
            font-size: 16px;
            font-weight: 700;
            color: #8b7355;
            margin-top: 2px
        }

        .prob-compare {
            margin: 16px 0
        }

        .prob-compare h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--accent-red)
        }

        .prob-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            gap: 6px
        }

        .prob-row .pl {
            width: 40px;
            font-size: 12px;
            font-weight: 600;
            text-align: right
        }

        .prob-row .pb {
            flex: 1;
            height: 18px;
            background: #e8dcc8;
            border-radius: 4px;
            overflow: hidden;
            position: relative
        }

        .prob-row .pf {
            height: 100%;
            border-radius: 4px;
            transition: width .5s;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 4px;
            font-size: 12px;
            font-weight: 600;
            min-width: 36px
        }

        .prob-row .pf.gold {
            background: linear-gradient(90deg, #ffd700, #ffec80);
            color: #8b6914
        }

        .prob-row .pf.blue {
            background: linear-gradient(90deg, #4a90d9, #6ab0ff);
            color: #fff
        }

        .prob-row .pf.green {
            background: linear-gradient(90deg, #4caf50, #81c784);
            color: #fff
        }

        .prob-row .pt {
            position: absolute;
            top: 0;
            bottom: 0;
            border-right: 2px dashed rgba(139, 37, 0, .5);
            z-index: 2
        }

        .prob-row .pp {
            width: 48px;
            font-size: 14px;
            font-weight: 600;
            text-align: right;
            color: #8b7355
        }

        .rank-list {
            margin-top: 14px
        }

        .rank-list h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--accent-red)
        }

        .rank-item {
            display: flex;
            align-items: center;
            padding: 7px 10px;
            border-bottom: 1px solid var(--border-light);
            gap: 8px
        }

        .rank-item:last-child {
            border-bottom: none
        }

        .rank-num {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--border-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            flex-shrink: 0
        }

        .rank-item:nth-child(1) .rank-num {
            background: #ffd700;
            color: #8b6914
        }

        .rank-item:nth-child(2) .rank-num {
            background: #c0c0c0;
            color: #555
        }

        .rank-item:nth-child(3) .rank-num {
            background: #cd7f32;
            color: #fff
        }

        .rank-name {
            flex: 1;
            font-size: 14px;
            font-weight: 700;
        }

        .rank-count {
            font-size: 14px;
            font-weight: 700;
            color: var(--accent-red)
        }

        .reset-section {
            margin-top: 20px;
            text-align: center;
            display: flex;
            justify-content: center;
            gap: 20px;
            /* flex-wrap: wrap; */
        }

        .reset-btn {
            padding: 8px 20px;
            border: 1px solid #ccc;
            background: #fff;
            border-radius: 6px;
            font-family: inherit;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            color: #999;
            transition: .2s
        }

        .reset-btn:hover {
            border-color: #e74c3c;
            color: #e74c3c
        }

        .footer {
            text-align: center;
            padding: 16px;
            font-size: 12px;
            font-weight: 500;
            color: #b0a090;
            border-top: 1px solid var(--border-light);
            margin-top: 30px
        }

        ::-webkit-scrollbar {
            width: 4px
        }

        ::-webkit-scrollbar-track {
            background: transparent
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-light);
            border-radius: 2px
        }

        /* Stats display in modal */
        .mi-stats {
            margin: 8px 0;
            text-align: center;
        }

        .mi-specialty {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 6px;
        }

        .mi-stats-header {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin-bottom: 4px;
        }

        .mi-stats-header span {
            width: 48px;
            font-size: 11px;
            font-weight: 600;
            color: #fff;
            text-align: center;
        }

        .mi-stats-values {
            display: flex;
            justify-content: center;
            gap: 4px;
        }

        .mi-stats-values span {
            width: 48px;
            font-size: 13px;
            font-weight: 700;
            color: #000;
            text-align: center;
            border-radius: 4px;
            padding: 2px 0;
        }

        .mi-stats-values span.rank-s {
            background: #ffd700;
        }

        .mi-stats-values span.rank-a {
            background: #87ceeb;
        }

        .mi-stats-values span.rank-b {
            background: #90ee90;
        }

        .mi-stats-values span.rank-c {
            background: #fff;
        }

        .mi-stats-values span.rank-d {
            background: #d3d3d3;
        }


        /* Pool list */
        .pool-list-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 255;
            background: rgba(44, 24, 16, .92);
            overflow-y: auto;
            padding: 16px
        }

        .pool-list-overlay.show {
            display: block
        }

        .pool-list-header {
            max-width: 480px;
            margin: 0 auto 12px;
            display: flex;
            justify-content: space-between;
            align-items: center
        }

        .pool-list-header h2 {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent-gold);
            letter-spacing: 2px
        }

        .pool-list-close {
            padding: 6px 14px;
            border: 1px solid rgba(201, 168, 76, .4);
            background: transparent;
            color: var(--accent-gold);
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer
        }

        .pool-list-close:hover {
            background: rgba(201, 168, 76, .15)
        }

        .pool-list-empty {
            max-width: 480px;
            margin: 40px auto;
            text-align: center;
            color: var(--text-light);
            opacity: .5;
            font-size: 14px
        }

        .pool-card {
            max-width: 480px;
            margin: 0 auto 10px;
            background: rgba(255, 255, 255, .08);
            border: 1px solid rgba(201, 168, 76, .3);
            border-radius: 10px;
            padding: 14px;
            cursor: pointer;
            transition: .2s
        }

        .pool-card:hover {
            background: rgba(255, 255, 255, .15);
            border-color: var(--accent-gold)
        }

        .pool-card-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent-gold);
            margin-bottom: 4px
        }

        .pool-card-info {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-light);
            margin-bottom: 4px
        }

        .pool-card-chars {
            font-size: 12px;
            font-weight: 500;
            color: rgba(212, 196, 168, .6);
            line-height: 1.5;
            max-height: 60px;
            overflow: hidden
        }

        .pool-card-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px
        }

        .pool-card-actions button {
            padding: 4px 12px;
            border: 1px solid rgba(201, 168, 76, .3);
            background: transparent;
            color: var(--accent-gold);
            border-radius: 4px;
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer
        }

        .pool-card-actions button:hover {
            background: rgba(201, 168, 76, .15)
        }

        .pool-card-actions button.danger {
            border-color: rgba(200, 60, 60, .4);
            color: #e88
        }

        .pool-card-actions button.danger:hover {
            background: rgba(200, 60, 60, .15)
        }

        .pool-card-active {
            border-color: var(--accent-gold);
            background: rgba(201, 168, 76, .12);
            box-shadow: 0 0 10px rgba(201, 168, 76, .2)
        }

        /* Stats table overlay */
        .stats-table-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 255;
            background: rgba(44, 24, 16, .92);
            overflow-y: auto;
            padding: 16px
        }

        .stats-table-overlay.show {
            display: block
        }

        .stats-table-header {
            max-width: 480px;
            margin: 0 auto 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px
        }

        .stats-table-header h2 {
            font-size: 18px;
            font-weight: 600;
            color: var(--accent-gold);
            letter-spacing: 2px
        }

        .stats-table-controls {
            max-width: 480px;
            margin: 0 auto 10px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            align-items: center
        }

        .stats-table-controls select,
        .stats-table-controls input {
            padding: 6px 10px;
            border: 1px solid rgba(201, 168, 76, .3);
            background: rgba(255, 255, 255, .1);
            color: var(--text-light);
            border-radius: 6px;
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            outline: none
        }

        .stats-table-controls select:focus,
        .stats-table-controls input:focus {
            border-color: var(--accent-gold)
        }

        .stats-table-controls option {
            background: #2c1810;
            color: var(--text-light)
        }

        .stats-table-wrap {
            max-width: 480px;
            margin: 0 auto
        }

        .stats-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            font-weight: 500
        }

        .stats-table th {
            position: sticky;
            top: 0;
            background: #2c1810;
            color: var(--accent-gold);
            padding: 8px 4px;
            font-weight: 600;
            border-bottom: 1px solid rgba(201, 168, 76, .3);
            cursor: pointer;
            white-space: nowrap;
            z-index: 1
        }

        .stats-table th:hover {
            color: #fff
        }

        .stats-table td {
            padding: 6px 4px;
            border-bottom: 1px solid rgba(255, 255, 255, .05);
            color: var(--text-light);
            text-align: center;
            white-space: nowrap;
            font-weight: 500
        }

        .stats-table tr:hover td {
            background: rgba(255, 255, 255, .05)
        }

        .stats-table .rarity-tian {
            color: #ffd700;
            font-weight: 600
        }

        .stats-table .rarity-hou {
            color: #6ab0ff;
            font-weight: 600
        }

        .stats-table .rarity-qing {
            color: #81c784;
            font-weight: 600
        }

        .stats-table .val-s {
            color: #ffd700;
            font-weight: 700
        }

        .stats-table .val-a {
            color: #87ceeb;
            font-weight: 600
        }

        .stats-table .val-b {
            color: #90ee90;
            font-weight: 500
        }

        .stats-table .val-c {
            color: #ccc;
            font-weight: 500
        }

        .stats-table .val-d {
            color: #999;
            font-weight: 500
        }

        .stats-table-close {
            padding: 6px 14px;
            border: 1px solid rgba(201, 168, 76, .4);
            background: transparent;
            color: var(--accent-gold);
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer
        }

        .stats-table-close:hover {
            background: rgba(201, 168, 76, .15)
        }

        /* Collection stats button */
        .stats-table-btn {
            padding: 5px 12px;
            border: 1px solid var(--accent-gold);
            background: transparent;
            color: var(--accent-gold);
            border-radius: 16px;
            font-family: inherit;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: .2s
        }

        .stats-table-btn:hover {
            background: rgba(201, 168, 76, .15)
        }
    </style>
</head>

<body>
    <div class="app">
        <div class="header">
            <h1>Jiangnan Gacha Simulator</h1>
        </div>
        <div class="nav-tabs">
            <div class="nav-tab active" data-tab="gacha">绘画</div>
            <div class="nav-tab" data-tab="collection">图鉴</div>
            <div class="nav-tab" data-tab="stats">统计</div>
        </div>
        <div class="content">
            <div class="tab-content active" id="tab-gacha">
                <div class="draw-section">
                    <div class="canvas-wrapper">
                        <canvas id="drawCanvas" width="456" height="400"></canvas>
                        <div class="canvas-overlay" id="canvasOverlay"><span>请着墨</span></div>
                    </div>
                    <div class="draw-controls">
                        <div class="mode-toggle">
                            <button class="mode-btn active" data-mode="1" onclick="setMode(1)">画一张</button>
                            <button class="mode-btn" data-mode="10" onclick="setMode(10)">画十张</button>
                        </div>
                        <button class="pool-toggle" id="poolListBtn" onclick="openPoolList()">画池</button><button
                            class="pool-toggle" id="poolToggle" onclick="openPool()">新建</button>
                    </div>
                    <div class="quick-stats" id="quickStats"></div>
                </div>
            </div>
            <div class="tab-content" id="tab-collection">
                <div class="collection-header">
                    <div class="filter-buttons">
                        <button class="stats-table-btn" onclick="openStatsTable()">角色数值</button>
                    </div>
                    <div class="filter-buttons">
                        <button class="filter-btn active" data-filter="all">全部</button>
                        <button class="filter-btn" data-filter="天">天级</button>
                        <button class="filter-btn" data-filter="侯">候级</button>
                        <button class="filter-btn" data-filter="卿">卿级</button>
                    </div>
                </div>
                <div class="collection-progress" id="collectionProgress"></div>
                <div class="collection-grid" id="collectionGrid"></div>
            </div>
            <div class="tab-content" id="tab-stats">
                <div class="stats-panel">
                    <div class="stats-grid" id="statsGrid"></div>
                    <div class="prob-compare" id="probCompare"></div>
                    <div class="rank-list" id="rankList"></div>
                    <div class="reset-section">
                        <button class="reset-btn" onclick="exportData()">导出</button>
                        <button class="reset-btn" onclick="importData()">导入</button>
                        <button class="reset-btn" onclick="resetAll()">重置</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="footer">角色数据来源于 <a href="https://wiki.biligame.com/jiangnan/" target=_blank"
                style="color: #76b5e2; text-decoration: none;">Bilibili Wiki</a> · 仅供娱乐</div>
    </div>

    <!-- REVEAL -->
    <div class="reveal-overlay" id="revealOverlay">
        <div class="reveal-counter" id="revealCounter"></div>
        <div class="reveal-art-area" id="revealArtArea" onclick="nextReveal()">
            <img class="bg-img" id="revealBg" src="">
            <img class="art-img" id="revealArt" src="">
            <div class="sparkles" id="sparkles"></div>
            <div class="new-tag" id="revealNew" style="display:none">NEW</div>
        </div>
        <div class="reveal-name" id="revealName"></div>
        <div class="reveal-actions"><button class="reveal-skip-btn" onclick="skipAll()">跳过</button></div>
    </div>

    <!-- ALL RESULTS -->
    <div class="all-results-overlay" id="allResultsOverlay">
        <div class="all-results-title" id="allResultsTitle"></div>
        <div class="all-results-grid" id="allResultsGrid"></div>
        <button class="all-results-close" onclick="closeAllResults()">确认</button>
    </div>

    <!-- POOL LIST -->
    <div class="pool-list-overlay" id="poolListOverlay">
        <div class="pool-list-header">
            <h2>画池</h2>
            <button class="pool-list-close" onclick="closePoolList()">关闭</button>
        </div>
        <div id="poolListContent"></div>
    </div>

    <!-- POOL -->
    <div class="pool-overlay" id="poolOverlay">
        <div class="pool-header">
            <h2>新建</h2>
            <div class="pool-actions">
                <button class="pool-action-btn" onclick="clearPool()">清空</button>
                <button class="pool-action-btn" onclick="selectAll()">全选</button>
                <button class="pool-action-btn primary" onclick="saveAndClosePool()">保存</button>
                <button class="pool-action-btn" onclick="closePool()">关闭</button>
            </div>
        </div>
        <div class="pool-search"><input type="text" id="poolNameInput" placeholder="输入画池名称..."></div>
        <div class="pool-search"><input type="text" id="poolSearch" placeholder="搜索角色名..." oninput="filterPool()"></div>
        <div class="pool-info" id="poolInfo"></div>
        <div class="pool-grid" id="poolGrid"></div>
    </div>

    <!-- STATS TABLE -->
    <div class="stats-table-overlay" id="statsTableOverlay">
        <div class="stats-table-header">
            <h2>角色五围数据</h2>
            <button class="stats-table-close" onclick="closeStatsTable()">关闭</button>
        </div>
        <div class="stats-table-controls">
            <select id="stFilterRarity" onchange="renderStatsTable()">
                <option value="all">全部稀有度</option>
                <option value="天">天级</option>
                <option value="侯">候级</option>
                <option value="卿">卿级</option>
            </select>
            <select id="stFilterOwned" onchange="renderStatsTable()">
                <option value="all">全部</option>
                <option value="owned">已获得</option>
                <option value="unowned">未获得</option>
            </select>
            <select id="stSortBy" onchange="renderStatsTable()">
                <option value="name">按名称</option>
                <option value="rarity">按稀有度</option>
                <option value="build">按建造</option>
                <option value="farm">按农牧</option>
                <option value="craft">按制作</option>
                <option value="mana">按理财</option>
                <option value="explore">按探险</option>
            </select>
            <input type="text" id="stSearch" placeholder="搜索..." oninput="renderStatsTable()" style="width:80px">
        </div>
        <div class="stats-table-wrap" id="statsTableWrap"></div>
    </div>

    <!-- DETAIL MODAL -->
    <div class="modal-overlay" id="modal" onclick="closeModal(event)">
        <div class="modal-content" id="modalContent"></div>

        function exportData() {
            const data = {
                jn_gacha_v6: localStorage.getItem('jn_gacha_v6'),
                jn_pools_v1: localStorage.getItem('jn_pools_v1')
            };

            if (!data.jn_gacha_v6 && !data.jn_pools_v1) {
                alert('暂无可导出的数据！');
                return;
            }

            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `backup_${new Date().toLocaleString().replace(/[/: ]/g, '-')}.json`;
            link.click();
            URL.revokeObjectURL(link.href);
            alert('数据导出成功！包含抽卡记录+卡池配置');
        }

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';

            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const backup = JSON.parse(e.target.result);

                        if (backup.jn_gacha_v6) localStorage.setItem('jn_gacha_v6', backup.jn_gacha_v6);
                        if (backup.jn_pools_v1) localStorage.setItem('jn_pools_v1', backup.jn_pools_v1);

                        alert('数据导入成功！页面即将自动刷新');
                        location.reload();
                    } catch (err) {
                        alert('导入失败！文件格式错误或已损坏');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function resetAll() {
            if (confirm('确定要重置所有数据吗？此操作不可恢复！')) {
                localStorage.removeItem('jn_gacha_v6');
                localStorage.removeItem('jn_pools_v1');
                location.reload();
            }
        }

        document.querySelectorAll('.nav-tab').forEach(tab => { tab.addEventListener('click', () => { document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active')); document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active')); tab.classList.add('active'); document.getElementById('tab-' + tab.dataset.tab).classList.add('active'); if (tab.dataset.tab === 'collection') renderCollection(); if (tab.dataset.tab === 'stats') renderStats() }) });
        document.querySelectorAll('.filter-btn').forEach(btn => { btn.addEventListener('click', () => { document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); collectionFilter = btn.dataset.filter; renderCollection() }) });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') { ['modal', 'allResultsOverlay', 'revealOverlay', 'poolOverlay', 'poolListOverlay', 'statsTableOverlay'].forEach(id => document.getElementById(id).classList.remove('show')) } });

        updateQuickStats();
    </script>
</body>

</html>
