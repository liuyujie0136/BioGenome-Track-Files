<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
    <title>Jiangnan Gacha Simulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent
        }

        :root {
            --bg-paper: #f5f0e8;
            --bg-dark: #2c1810;
            --text-dark: #3d2b1f;
            --text-light: #d4c4a8;
            --accent-red: #8b2500;
            --accent-gold: #c9a84c;
            --gold: #ffd700;
            --blue: #4a90d9;
            --green: #4caf50;
            --border-light: #d4c4a8;
            --card-bg: #faf6ef
        }

        body {
            font-family: 'Noto Serif SC', 'STSong', 'SimSun', serif;
            background: var(--bg-paper);
            color: var(--text-dark);
            min-height: 100vh;
            overflow-x: hidden;
            user-select: none
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 20% 50%, rgba(201, 168, 76, .06) 0%, transparent 50%), radial-gradient(ellipse at 80% 20%, rgba(139, 37, 0, .04) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0
        }

        .app {
            position: relative;
            z-index: 1;
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh
        }

        .header {
            background: linear-gradient(135deg, #2c1810, #4a2c1a 50%, #2c1810);
            color: var(--text-light);
            padding: 18px 16px 14px;
            text-align: center;
            position: relative;
            overflow: hidden
        }

        .header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5L35 15L30 12L25 15Z' fill='rgba(201,168,76,.08)'/%3E%3C/svg%3E") repeat;
            pointer-events: none
        }

        .header h1 {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 8px;
            color: var(--accent-gold);
            text-shadow: 0 2px 8px rgba(0, 0, 0, .3);
            position: relative
        }

        .header .subtitle {
            font-size: 12px;
            color: var(--text-light);
            opacity: .7;
            margin-top: 2px;
            letter-spacing: 3px
        }

        .nav-tabs {
            display: flex;
            background: #3d2b1f;
            border-bottom: 2px solid var(--accent-gold);
            position: sticky;
            top: 0;
            z-index: 50
        }

        .nav-tab {
            flex: 1;
            padding: 11px 4px;
            text-align: center;
            color: var(--text-light);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: .3s;
            border-bottom: 3px solid transparent;
            letter-spacing: 1px
        }

        .nav-tab:hover {
            background: rgba(201, 168, 76, .1)
        }

        .nav-tab.active {
            color: var(--accent-gold);
            border-bottom-color: var(--accent-gold);
            background: rgba(201, 168, 76, .15)
        }

        .content {
            padding: 12px
        }

        .tab-content {
            display: none
        }

        .tab-content.active {
            display: block
        }

        /* DRAWING */
        .draw-section {
            text-align: center
        }

        .draw-hint {
            font-size: 13px;
            color: #8b7355;
            margin-bottom: 8px;
            letter-spacing: 1px
        }

        .canvas-wrapper {
            position: relative;
            border: 2px solid var(--border-light);
            border-radius: 12px;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 4px 20px rgba(0, 0, 0, .08), inset 0 0 60px rgba(245, 240, 232, .5);
            margin: 0 auto
        }

        #drawCanvas {
            display: block;
            width: 100%;
            cursor: crosshair;
            touch-action: none
        }

        .canvas-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            opacity: .3;
            transition: opacity .3s
        }

        .canvas-overlay.hidden {
            opacity: 0
        }

        .canvas-overlay span {
            font-size: 48px;
            font-weight: 900;
            color: #c0b090;
            letter-spacing: 8px
        }

        .draw-controls {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap
        }

        .mode-toggle {
            display: flex;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-light)
        }

        .mode-btn {
            padding: 7px 14px;
            border: none;
            background: var(--card-bg);
            font-family: inherit;
            font-size: 13px;
            cursor: pointer;
            color: var(--text-dark);
            transition: .2s
        }

        .mode-btn.active {
            background: var(--accent-red);
            color: #fff
        }

        .clear-btn {
            padding: 7px 14px;
            border: 1px solid #ccc;
            background: #fff;
            border-radius: 6px;
            font-family: inherit;
            font-size: 12px;
            cursor: pointer;
            color: #999;
            transition: .2s
        }

        .clear-btn:hover {
            border-color: #e74c3c;
            color: #e74c3c
        }

        .pool-toggle {
            padding: 7px 14px;
            border: 1px solid var(--accent-gold);
            background: transparent;
            color: var(--accent-gold);
            border-radius: 6px;
            font-family: inherit;
            font-size: 12px;
            cursor: pointer;
            transition: .2s
        }

        .pool-toggle:hover {
            background: rgba(201, 168, 76, .15)
        }

        .pool-toggle.active {
            background: var(--accent-gold);
            color: #fff
        }

        .quick-stats {
            display: flex;
            gap: 6px;
            margin-top: 12px;
            flex-wrap: wrap;
            justify-content: center
        }

        .stat-chip {
            padding: 5px 10px;
            background: rgba(201, 168, 76, .1);
            border: 1px solid rgba(201, 168, 76, .3);
            border-radius: 16px;
            font-size: 12px
        }

        .stat-chip strong {
            color: var(--accent-red)
        }

        /* REVEAL - artwork with background */
        .reveal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 200;
            background: linear-gradient(180deg, #1a0e08, #2c1810 30%, #3d2b1f);
            flex-direction: column;
            align-items: center;
            justify-content: center
        }

        .reveal-overlay.show {
            display: flex
        }

        .reveal-counter {
            font-size: 14px;
            color: var(--accent-gold);
            margin-bottom: 10px;
            letter-spacing: 2px;
            opacity: .8
        }

        .reveal-art-area {
            position: relative;
            width: 280px;
            height: 400px;
            margin-bottom: 12px;
            cursor: pointer;
            border-radius: 12px;
            overflow: hidden;
            opacity: 0;
            transform: scale(.92);
            transition: opacity .5s ease, transform .5s ease
        }

        .reveal-art-area.visible {
            opacity: 1;
            transform: scale(1)
        }

        .reveal-art-area .bg-img {
            position: absolute;
            inset: 0;
            left: 5%;
            width: 90%;
            height: 100%;
            object-fit: contain
        }

        .reveal-art-area .art-img {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            height: 80%;
            object-fit: contain;
            object-position: bottom center
        }

        .reveal-art-area .new-tag {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #e74c3c;
            color: #fff;
            font-size: 13px;
            padding: 4px 12px;
            border-radius: 6px;
            font-weight: 700;
            animation: newPulse 1s ease-in-out infinite;
            z-index: 2
        }

        @keyframes newPulse {

            0%,
            100% {
                transform: scale(1)
            }

            50% {
                transform: scale(1.1)
            }
        }

        .reveal-art-area .sparkles {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 1
        }

        .sparkle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: var(--gold);
            border-radius: 50%;
            animation: sparkleAnim 1.5s ease-out forwards
        }

        @keyframes sparkleAnim {
            0% {
                opacity: 1;
                transform: scale(0) translate(0, 0)
            }

            50% {
                opacity: 1;
                transform: scale(1) translate(var(--tx), var(--ty))
            }

            100% {
                opacity: 0;
                transform: scale(.5) translate(calc(var(--tx)*2), calc(var(--ty)*2))
            }
        }

        .reveal-name {
            color: #ffffff;
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 4px;
            margin-bottom: 4px;
            opacity: 1;
            transform: translateY(10px);
            transition: opacity .4s .2s, transform .4s .2s
        }

        .reveal-name.visible {
            opacity: 1;
            transform: translateY(0)
        }

        .reveal-name.tian {
            color: #ffd700;
            text-shadow: 0 2px 12px rgba(255, 215, 0, .5)
        }

        .reveal-name.hou {
            color: #6ab0ff;
            text-shadow: 0 2px 12px rgba(74, 144, 217, .4)
        }

        .reveal-name.qing {
            color: #81c784;
            text-shadow: 0 2px 12px rgba(76, 175, 80, .4)
        }

        .reveal-hint {
            font-size: 13px;
            color: rgba(212, 196, 168, .5);
            letter-spacing: 2px;
            margin-top: 8px;
            animation: hintBlink 2s ease-in-out infinite
        }

        @keyframes hintBlink {

            0%,
            100% {
                opacity: .3
            }

            50% {
                opacity: .7
            }
        }

        .reveal-actions {
            margin-top: 8px
        }

        .reveal-skip-btn {
            padding: 8px 24px;
            border: 1px solid rgba(201, 168, 76, .4);
            background: transparent;
            color: var(--accent-gold);
            border-radius: 6px;
            font-family: inherit;
            font-size: 13px;
            cursor: pointer;
            transition: .2s;
            letter-spacing: 2px
        }

        .reveal-skip-btn:hover {
            background: rgba(201, 168, 76, .15)
        }

        /* ALL RESULTS */
        .all-results-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 200;
            background: linear-gradient(180deg, #1a0e08, #2c1810 30%, #3d2b1f);
            overflow-y: auto;
            padding: 16px
        }

        .all-results-overlay.show {
            display: block
        }

        .all-results-title {
            text-align: center;
            font-size: 18px;
            color: var(--accent-gold);
            letter-spacing: 4px;
            margin-bottom: 16px
        }

        .all-results-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            max-width: 480px;
            margin: 0 auto 20px
        }

        .mini-card {
            aspect-ratio: 3/4;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: .3s;
            position: relative;
            animation: miniIn .3s ease-out both
        }

        .mini-card:hover {
            transform: translateY(-3px)
        }

        @keyframes miniIn {
            from {
                opacity: 0;
                transform: scale(.8)
            }

            to {
                opacity: 1;
                transform: scale(1)
            }
        }

        .mini-card .mc-bg {
            position: absolute;
            inset: 0;
            left: 5%;
            width: 90%;
            height: 100%;
            object-fit: contain
        }

        .mini-card .mc-art {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            height: 80%;
            object-fit: contain;
            object-position: bottom center
        }

        .mini-card .mc-name {
            position: absolute;
            bottom: 5%;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 1px 4px rgba(0, 0, 0, .8);
            padding: 2px;
            background: linear-gradient(transparent, rgba(0, 0, 0, .6));
            z-index: 1
        }

        .mini-card .mc-new {
            position: absolute;
            top: 2px;
            right: 2px;
            background: #e74c3c;
            color: #fff;
            font-size: 7px;
            padding: 1px 4px;
            border-radius: 3px;
            font-weight: 700;
            z-index: 2
        }

        .mini-card.tian {
            border: 2px solid var(--gold);
            box-shadow: 0 0 10px rgba(255, 215, 0, .3)
        }

        .mini-card.hou {
            border: 2px solid var(--blue)
        }

        .mini-card.qing {
            border: 2px solid var(--green)
        }

        .all-results-close {
            display: block;
            margin: 0 auto;
            padding: 10px 40px;
            border: 1px solid rgba(201, 168, 76, .4);
            background: transparent;
            color: var(--accent-gold);
            border-radius: 8px;
            font-family: inherit;
            font-size: 15px;
            cursor: pointer;
            letter-spacing: 4px;
            transition: .2s
        }

        .all-results-close:hover {
            background: rgba(201, 168, 76, .15)
        }

        /* COLLECTION */
        .collection-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px
        }

        .collection-header h2 {
            font-size: 18px;
            color: var(--accent-red)
        }

        .filter-buttons {
            display: flex;
            gap: 5px
        }

        .filter-btn {
            padding: 5px 12px;
            border: 1px solid var(--border-light);
            background: var(--card-bg);
            border-radius: 16px;
            font-family: inherit;
            font-size: 12px;
            cursor: pointer;
            transition: .2s;
            color: var(--text-dark)
        }

        .filter-btn:hover {
            border-color: var(--accent-gold)
        }

        .filter-btn.active {
            background: var(--accent-red);
            color: #fff;
            border-color: var(--accent-red)
        }

        .collection-progress {
            margin-bottom: 12px;
            padding: 10px 14px;
            background: var(--card-bg);
            border-radius: 8px;
            border: 1px solid var(--border-light)
        }

        .progress-bar {
            height: 8px;
            background: #e8dcc8;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 6px
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-red), var(--accent-gold));
            border-radius: 4px;
            transition: width .5s
        }

        .collection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
            gap: 6px
        }

        .collection-item {
            aspect-ratio: 1;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: .2s;
            position: relative;
            overflow: hidden
        }

        .collection-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 0, 0, .12)
        }

        .collection-item.locked {
            opacity: .4;
            filter: grayscale(.8)
        }

        .collection-item .ci-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            object-fit: cover;
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%)
        }

        .collection-item .ci-frame {
            width: 72px;
            height: 70px;
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none
        }

        .collection-item .ci-name {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            line-height: 1.2;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            padding: 0 2px
        }

        .collection-item .ci-count {
            position: absolute;
            top: 0;
            right: 0;
            background: rgba(0, 0, 0, .6);
            color: #fff;
            font-size: 7px;
            padding: 0 3px;
            border-radius: 0 8px 0 4px
        }

        .collection-item.tian {
            background: rgba(255, 215, 0, .1)
        }

        .collection-item.hou {
            background: rgba(74, 144, 217, .08)
        }

        .collection-item.qing {
            background: rgba(76, 175, 80, .08)
        }

        /* DETAIL MODAL - artwork with background */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(44, 24, 16, .9);
            z-index: 300;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px)
        }

        .modal-overlay.show {
            display: flex
        }

        .modal-content {
            max-width: 320px;
            width: 90%;
            text-align: center;
            animation: modalIn .3s ease-out;
            border-radius: 16px;
            overflow: hidden;
            background: #2c1810
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(.9)
            }

            to {
                opacity: 1;
                transform: scale(1)
            }
        }

        .modal-art-area {
            position: relative;
            width: 100%;
            height: 360px;
            overflow: hidden
        }

        .modal-art-area .ma-bg {
            position: absolute;
            inset: 0;
            left: 5%;
            width: 90%;
            height: 100%;
            object-fit: contain
        }

        .modal-art-area .ma-art {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            height: 80%;
            object-fit: contain;
            object-position: bottom center
        }

        .modal-art-area .ma-new {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #e74c3c;
            color: #fff;
            font-size: 12px;
            padding: 3px 10px;
            border-radius: 4px;
            font-weight: 700
        }

        .modal-info {
            padding: 16px;
            background: #2c1810
        }

        .modal-info .mi-name {
            color: #ffffff;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 4px;
            margin-bottom: 4px
        }

        .modal-info .mi-name.tian {
            color: #ffd700
        }

        .modal-info .mi-name.hou {
            color: #6ab0ff
        }

        .modal-info .mi-name.qing {
            color: #81c784
        }

        .modal-info .mi-count {
            font-size: 13px;
            color: var(--text-light)
        }

        .modal-close {
            margin-top: 12px;
            padding: 7px 28px;
            border: 1px solid rgba(201, 168, 76, .4);
            background: transparent;
            color: var(--accent-gold);
            border-radius: 6px;
            font-family: inherit;
            font-size: 13px;
            cursor: pointer;
            transition: .2s
        }

        .modal-close:hover {
            background: rgba(201, 168, 76, .15)
        }

        /* CUSTOM POOL */
        .pool-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 250;
            background: rgba(44, 24, 16, .92);
            overflow-y: auto;
            padding: 16px
        }

        .pool-overlay.show {
            display: block
        }

        .pool-header {
            max-width: 480px;
            margin: 0 auto 12px;
            display: flex;
            justify-content: space-between;
            align-items: center
        }

        .pool-header h2 {
            font-size: 18px;
            color: var(--accent-gold);
            letter-spacing: 2px
        }

        .pool-actions {
            display: flex;
            gap: 8px
        }

        .pool-action-btn {
            padding: 6px 14px;
            border: 1px solid rgba(201, 168, 76, .4);
            background: transparent;
            color: var(--accent-gold);
            border-radius: 6px;
            font-family: inherit;
            font-size: 12px;
            cursor: pointer;
            transition: .2s
        }

        .pool-action-btn:hover {
            background: rgba(201, 168, 76, .15)
        }

        .pool-action-btn.primary {
            background: var(--accent-gold);
            color: #2c1810;
            border-color: var(--accent-gold)
        }

        .pool-info {
            max-width: 480px;
            margin: 0 auto 12px;
            font-size: 13px;
            color: var(--text-light);
            text-align: center
        }

        .pool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
            gap: 6px;
            max-width: 480px;
            margin: 0 auto
        }

        .pool-item {
            aspect-ratio: 1;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: .2s;
            position: relative;
            overflow: hidden
        }

        .pool-item:hover {
            transform: translateY(-2px)
        }

        .pool-item.selected {
            box-shadow: 0 0 12px rgba(201, 168, 76, .5)
        }

        .pool-item.tian {
            background: rgba(255, 215, 0, .1)
        }

        .pool-item.tian.selected {
            background: rgba(255, 215, 0, .25)
        }

        .pool-item.hou {
            background: rgba(74, 144, 217, .08)
        }

        .pool-item.hou.selected {
            background: rgba(74, 144, 217, .2)
        }

        .pool-item.qing {
            background: rgba(76, 175, 80, .08)
        }

        .pool-item.qing.selected {
            background: rgba(76, 175, 80, .2)
        }

        .pool-item .pi-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%)
        }

        .pool-item .pi-frame {
            width: 60px;
            height: 60px;
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none
        }

        .pool-item .pi-name {
            color: #ffffff;
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            line-height: 1.2;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            padding: 0 2px
        }

        .pool-item .check-mark {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--accent-gold);
            color: #2c1810;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 900;
            z-index: 2
        }

        .pool-item.selected .check-mark {
            display: flex
        }

        .pool-search {
            max-width: 480px;
            margin: 0 auto 12px
        }

        .pool-search input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border-light);
            border-radius: 8px;
            font-family: inherit;
            font-size: 13px;
            background: rgba(255, 255, 255, .1);
            color: var(--text-light);
            outline: none
        }

        .pool-search input::placeholder {
            color: rgba(212, 196, 168, .5)
        }

        .pool-search input:focus {
            border-color: var(--accent-gold)
        }

        /* STATS */
        .stats-panel {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid var(--border-light)
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 16px
        }

        .stat-card {
            padding: 14px;
            background: var(--bg-paper);
            border-radius: 8px;
            text-align: center;
            border: 1px solid var(--border-light)
        }

        .stat-card .sv {
            font-size: 26px;
            font-weight: 900;
            color: var(--accent-red)
        }

        .stat-card .sl {
            font-size: 11px;
            color: #8b7355;
            margin-top: 2px
        }

        .prob-compare {
            margin: 16px 0
        }

        .prob-compare h3 {
            font-size: 15px;
            margin-bottom: 10px;
            color: var(--accent-red)
        }

        .prob-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            gap: 6px
        }

        .prob-row .pl {
            width: 40px;
            font-size: 12px;
            font-weight: 600;
            text-align: right
        }

        .prob-row .pb {
            flex: 1;
            height: 18px;
            background: #e8dcc8;
            border-radius: 4px;
            overflow: hidden;
            position: relative
        }

        .prob-row .pf {
            height: 100%;
            border-radius: 4px;
            transition: width .5s;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 4px;
            font-size: 10px;
            font-weight: 600;
            min-width: 36px
        }

        .prob-row .pf.gold {
            background: linear-gradient(90deg, #ffd700, #ffec80);
            color: #8b6914
        }

        .prob-row .pf.blue {
            background: linear-gradient(90deg, #4a90d9, #6ab0ff);
            color: #fff
        }

        .prob-row .pf.green {
            background: linear-gradient(90deg, #4caf50, #81c784);
            color: #fff
        }

        .prob-row .pt {
            position: absolute;
            top: 0;
            bottom: 0;
            border-right: 2px dashed rgba(139, 37, 0, .5);
            z-index: 2
        }

        .prob-row .pp {
            width: 48px;
            font-size: 11px;
            text-align: right;
            color: #8b7355
        }

        .rank-list {
            margin-top: 14px
        }

        .rank-list h3 {
            font-size: 15px;
            margin-bottom: 10px;
            color: var(--accent-red)
        }

        .rank-item {
            display: flex;
            align-items: center;
            padding: 7px 10px;
            border-bottom: 1px solid var(--border-light);
            gap: 8px
        }

        .rank-item:last-child {
            border-bottom: none
        }

        .rank-num {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--border-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            flex-shrink: 0
        }

        .rank-item:nth-child(1) .rank-num {
            background: #ffd700;
            color: #8b6914
        }

        .rank-item:nth-child(2) .rank-num {
            background: #c0c0c0;
            color: #555
        }

        .rank-item:nth-child(3) .rank-num {
            background: #cd7f32;
            color: #fff
        }

        .rank-name {
            flex: 1;
            font-size: 13px
        }

        .rank-count {
            font-size: 13px;
            font-weight: 700;
            color: var(--accent-red)
        }

        .reset-section {
            margin-top: 20px;
            text-align: center
        }

        .reset-btn {
            padding: 8px 20px;
            border: 1px solid #ccc;
            background: #fff;
            border-radius: 6px;
            font-family: inherit;
            font-size: 13px;
            cursor: pointer;
            color: #999;
            transition: .2s
        }

        .reset-btn:hover {
            border-color: #e74c3c;
            color: #e74c3c
        }

        .footer {
            text-align: center;
            padding: 16px;
            font-size: 11px;
            color: #b0a090;
            border-top: 1px solid var(--border-light);
            margin-top: 30px
        }

        ::-webkit-scrollbar {
            width: 4px
        }

        ::-webkit-scrollbar-track {
            background: transparent
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-light);
            border-radius: 2px
        }
    </style>

        // Collection
        let collectionFilter = 'all';
        function renderCollection() { const grid = document.getElementById('collectionGrid'), progress = document.getElementById('collectionProgress'), total = ALL_CHARS.length, collected = Object.keys(state.collection).length, pct = total > 0 ? (collected / total * 100).toFixed(1) : 0; progress.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:13px;font-weight:600">收集进度</span><span style="font-size:13px;color:var(--accent-red);font-weight:700">${collected} / ${total} (${pct}%)</span></div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`; let filtered = ALL_CHARS; if (collectionFilter !== 'all') filtered = ALL_CHARS.filter(c => c.rarity === collectionFilter); filtered.sort((a, b) => { const ah = state.collection[a.name] ? 1 : 0, bh = state.collection[b.name] ? 1 : 0; if (ah !== bh) return bh - ah; const o = { [R_TIAN]: 0, [R_HOU]: 1, [R_QING]: 2 }; return o[a.rarity] - o[b.rarity] }); let h = ''; filtered.forEach(c => { const cnt = state.collection[c.name] || 0, locked = cnt === 0; h += `<div class="collection-item ${c.rarity} ${locked ? 'locked' : ''}" onclick="showCharDetail('${c.name}','${c.rarity}')"><img class="ci-avatar" src="${c.avatar}" onerror="this.style.display='none'"><img class="ci-frame" src="${FRAME_MAP[c.rarity]}"><div class="ci-name">${c.name}</div>${cnt > 1 ? `<div class="ci-count">x${cnt}</div>` : ''}</div>` }); grid.innerHTML = h }

        // Stats
        function renderStats() { const grid = document.getElementById('statsGrid'), total = ALL_CHARS.length, collected = Object.keys(state.collection).length; const tT = ALL_CHARS.filter(c => c.rarity === R_TIAN).length, hT = ALL_CHARS.filter(c => c.rarity === R_HOU).length; const tC = ALL_CHARS.filter(c => c.rarity === R_TIAN && state.collection[c.name]).length, hC = ALL_CHARS.filter(c => c.rarity === R_HOU && state.collection[c.name]).length; grid.innerHTML = `<div class="stat-card"><div class="sv">${state.totalDraws}</div><div class="sl">总抽数</div></div><div class="stat-card"><div class="sv">${collected}<span style="font-size:13px;color:#8b7355">/${total}</span></div><div class="sl">已收集角色</div></div><div class="stat-card"><div class="sv" style="color:#b8860b">${tC}<span style="font-size:13px;color:#8b7355">/${tT}</span></div><div class="sl">天级收集</div></div><div class="stat-card"><div class="sv" style="color:#2a5a8a">${hC}<span style="font-size:13px;color:#8b7355">/${hT}</span></div><div class="sl">候级收集</div></div>`; const cmp = document.getElementById('probCompare'), td = state.totalDraws || 1; const tp = (state.rarityStats[R_TIAN] / td * 100), hp = (state.rarityStats[R_HOU] / td * 100), qp = (state.rarityStats[R_QING] / td * 100); cmp.innerHTML = `<h3>概率对比 (实际 vs 理论)</h3><div class="prob-row"><div class="pl" style="color:#b8860b">天级</div><div class="pb"><div class="pt" style="left:6%"></div><div class="pf gold" style="width:${Math.max(tp, 1)}%">${tp.toFixed(1)}%</div></div><div class="pp">6.0%</div></div><div class="prob-row"><div class="pl" style="color:#2a5a8a">候级</div><div class="pb"><div class="pt" style="left:26%"></div><div class="pf blue" style="width:${Math.max(hp, 1)}%">${hp.toFixed(1)}%</div></div><div class="pp">26.0%</div></div><div class="prob-row"><div class="pl" style="color:#2e7d32">卿级</div><div class="pb"><div class="pt" style="left:68%"></div><div class="pf green" style="width:${Math.max(qp, 1)}%">${qp.toFixed(1)}%</div></div><div class="pp">68.0%</div></div><div style="font-size:10px;color:#b0a090;margin-top:4px">虚线 = 理论概率</div>`; const rank = document.getElementById('rankList'), sorted = Object.entries(state.collection).sort((a, b) => b[1] - a[1]).slice(0, 10); if (!sorted.length) rank.innerHTML = '<div style="text-align:center;padding:30px;color:#b0a090">暂无数据</div>'; else { let h = '<h3>重复最多排行</h3>'; sorted.forEach(([n, c], i) => { const ch = ALL_CHARS.find(x => x.name === n), r = ch ? ch.rarity : R_QING, cl = r === R_TIAN ? '#b8860b' : r === R_HOU ? '#2a5a8a' : '#2e7d32'; h += `<div class="rank-item"><div class="rank-num">${i + 1}</div><div class="rank-name" style="color:${cl}">${n}</div><div class="rank-count">x${c}</div></div>` }); rank.innerHTML = h } }

        // Detail modal - shows artwork with background
        function showCharDetail(name, rarity) { const modal = document.getElementById('modal'), content = document.getElementById('modalContent'); const count = state.collection[name] || 0; const char = ALL_CHARS.find(c => c.name === name); const art = char ? char.art : ''; const avatar = char ? char.avatar : ''; const tc = rarity === R_TIAN ? '#ffd700' : rarity === R_HOU ? '#6ab0ff' : '#81c784'; content.innerHTML = `<div class="modal-art-area"><img class="ma-bg" src="${BG_MAP[rarity]}"><img class="ma-art" src="${art}" onerror="this.src='${avatar}';this.onerror=null">${!count ? '<div class="ma-new">NEW</div>' : ''}</div><div class="modal-info"><div class="mi-name ${rarity}">${name}</div><div class="mi-count">已获得 ${count} 次</div><button class="modal-close" onclick="document.getElementById('modal').classList.remove('show')">关闭</button></div>`; modal.classList.add('show') }
        function closeModal(e) { if (e.target === e.currentTarget) document.getElementById('modal').classList.remove('show') }

        function resetAll() { if (!confirm('确定要重置所有抽卡数据吗？')) return; state = defaultState(); saveState(); updateQuickStats(); renderCollection(); renderStats() }

        document.querySelectorAll('.nav-tab').forEach(tab => { tab.addEventListener('click', () => { document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active')); document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active')); tab.classList.add('active'); document.getElementById('tab-' + tab.dataset.tab).classList.add('active'); if (tab.dataset.tab === 'collection') renderCollection(); if (tab.dataset.tab === 'stats') renderStats() }) });
        document.querySelectorAll('.filter-btn').forEach(btn => { btn.addEventListener('click', () => { document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); collectionFilter = btn.dataset.filter; renderCollection() }) });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') { ['modal', 'allResultsOverlay', 'revealOverlay', 'poolOverlay'].forEach(id => document.getElementById(id).classList.remove('show')) } });

        updateQuickStats();
    </script>
</body>

</html>
